name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@v2.0.0
        with:
          additional_files: git-co git-branch-clean git-branch-close
